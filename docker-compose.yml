services:
  db:
    image: postgres:15
    container_name: expense_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: expense_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: expense_backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/expense_db

  frontend:
    build:
      context: ./frontend
    container_name: expense_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata: